<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>產業報告</title>
  <link rel="icon" type="image/svg+xml" href="/chisato-reports/assets/favicon.svg" />
  <link rel="stylesheet" href="/chisato-reports/assets/style.css" />
</head>
<body>
  <main class="page industry-index">
    <header class="site-header">
      <div class="brand-bar">
        <a class="brand" href="/chisato-reports/index.html">小千研究報告站</a>
        <nav class="site-nav"><a href="/chisato-reports/index.html">首頁</a><a href="/chisato-reports/industry/index.html">產業報告</a><a href="/chisato-reports/daily/index.html">每日早報</a></nav>
      </div>
      <div class="breadcrumb">產業報告</div>
      <h1>產業報告</h1>
      <p class="page-intro">按主題與日期整理的長文研究庫。</p>
    </header>
    <section class="content">
      <div class="filter-bar">
        <span class="filter-label">產業篩選：</span>
        <button class="filter-chip active" data-filter="all">全部</button>
        <button class="filter-chip" data-filter="AI伺服器與資料中心">AI伺服器與資料中心</button>
        <button class="filter-chip" data-filter="印刷電路板">印刷電路板</button>
        <button class="filter-chip" data-filter="太空衛星科技">太空衛星科技</button>
        <button class="filter-chip" data-filter="被動元件">被動元件</button>
        <button class="filter-chip" data-filter="造紙產業">造紙產業</button>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('.filter-chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        var filter = this.getAttribute('data-filter');
        document.querySelectorAll('.entry-card').forEach(function(card) {
          if (filter === 'all' || card.getAttribute('data-industry') === filter) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
